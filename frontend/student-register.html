<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">Student Registration</h2>

                <form id="registerForm">

                    <input type="text" id="name" class="form-control mb-3" placeholder="Name" required>

                    <input type="text" id="roll_number" class="form-control mb-3" placeholder="Roll Number" required>

                    <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

                    <input type="text" id="phone" class="form-control mb-3" placeholder="Phone Number" required>

                    <input type="text" id="department" class="form-control mb-3" placeholder="Department" required>

                    <input type="number" id="year" class="form-control mb-3" placeholder="Year" required>

                    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

                    <button type="submit" class="btn btn-success w-100">
                        Register
                    </button>

                </form>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="student-login.html">Login</a>
                </p>

            </div>

        </div>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>

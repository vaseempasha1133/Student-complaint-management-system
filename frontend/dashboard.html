<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Student Dashboard</h2>

    <div class="card p-4 shadow">

        <h4>Welcome, <span id="studentName"></span></h4>

        <p><strong>Email:</strong> <span id="studentEmail"></span></p>

        <p><strong>Roll Number:</strong> <span id="studentRoll"></span></p>

        <hr>

        <div class="d-grid gap-3">

            <a href="complaint.html" class="btn btn-primary">
                Submit Complaint
            </a>

            <a href="history.html" class="btn btn-success">
                My Complaints
            </a>

            <button id="logoutBtn" class="btn btn-danger">
                Logout
            </button>

        </div>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>

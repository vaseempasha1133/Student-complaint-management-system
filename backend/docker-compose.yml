version: "3.9"

services:
  backend:
    build: .
    container_name: student-complaint-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: student-complaint-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped